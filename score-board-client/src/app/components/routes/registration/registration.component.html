<div class="registration-container">
  <mat-card class="animated fadeIn">
    <mat-card-title i18n>Registration</mat-card-title>
    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <mat-form-field>
          <input type="text" matInput placeholder="Username" i18n-placeholder formControlName="playerName" required>
        </mat-form-field>
        <mat-form-field>
          <input type="text" matInput placeholder="First Name" i18n-placeholder formControlName="firstName">
        </mat-form-field>
        <mat-form-field>
          <input type="text" matInput placeholder="Last Name" i18n-placeholder formControlName="lastName">
        </mat-form-field>
        <mat-form-field>
          <input type="email" matInput placeholder="Email" i18n-placeholder formControlName="email" required>
          <mat-error>
            <div *ngIf="submitted && form.email.errors && form.email.errors.email" class="invalid-feedback" i18n>
              Email must be a valid email address
            </div>
          </mat-error>
        </mat-form-field>
        <mat-form-field>
          <input type="password" matInput placeholder="Password" i18n-placeholder formControlName="password" required>
          <mat-error>
            <div *ngIf="submitted && form.password.errors" class="invalid-feedback" i18n>
              Password must have minimum 8 characters
            </div>
          </mat-error>
        </mat-form-field>
        <mat-form-field>
          <input type="password" matInput placeholder="Confirm Password" i18n-placeholder formControlName="passwordConfirm" required>
          <mat-error>
            <div *ngIf="submitted && form.passwordConfirm.errors" i18n>
              Password not confirmed
            </div>
          </mat-error>
        </mat-form-field>
        <mat-error *ngIf="error" class="error">
          {{ error }}
        </mat-error>
        <div class="button-container">
          <button type="submit" mat-stroked-button color="accent" i18n>Register</button>
        </div>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <button mat-stroked-button color="accent" routerLink="/login" i18n>Back to Login</button>
    </mat-card-actions>
  </mat-card>
</div>
