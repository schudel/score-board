<div class="login-container">
  <mat-card class="animated fadeIn">
    <mat-card-title i18n>Login</mat-card-title>
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field>
          <input type="text" matInput placeholder="Username" i18n-placeholder formControlName="playerName" required>
        </mat-form-field>
        <mat-form-field>
          <input type="password" matInput placeholder="Password" i18n-placeholder formControlName="password" required>
        </mat-form-field>
        <!--
        <p>
          <mat-checkbox class="example-margin" formControlName="stayLoggedIn" i18n>stay logged in </mat-checkbox>
        </p>
        -->
        <mat-error *ngIf="error" class="error">
          {{ error }}
        </mat-error>
        <div class="button-container">
          <button type="submit" mat-stroked-button color="accent" i18n>Login</button>
          <a mat-stroked-button color="accent" routerLink="/registration" i18n>Register</a>
        </div>
        <div class="password-forgotten-container">
          <a mat-button color="accent" routerLink="/request-password-reset" i18n>Password forgotten?</a>
        </div>
      </form>
    </mat-card-content>
    <mat-card-footer>
      <div class="current-year" i18n="@@copyRightText">
        Copyright © {{currentYear}}, B. Schudel
      </div>
    </mat-card-footer>
  </mat-card>
</div>
