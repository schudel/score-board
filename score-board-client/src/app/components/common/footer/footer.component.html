<div class="footer-container" [ngClass]="{'dark-theme': isDarkTheme}">
  <mat-toolbar *ngIf="currentPlayer" color="primary" class="mat-elevation-z9 animated slideInUp">
    <mat-toolbar-row>
      <span class="menu-spacer"></span>
      <div> <!-- fxShow="true" fxHide.lt-md -->
        <!-- The following menu items will be hidden on both SM and XS screen sizes -->
        <span class="current-year" i18n="@@copyRightText">
          Copyright © {{currentYear}}, B. Schudel
        </span>
        <a routerLink="/privacy-policy" mat-button routerLinkActive="mat-accent"><ng-container i18n="@@privacyPolicyMenuText">Privacy policy</ng-container></a>
        <a routerLink="/disclaimers" mat-button routerLinkActive="mat-accent"><ng-container i18n="@@disclaimerMenuText">Disclaimers</ng-container></a>
      </div>
      <span class="menu-spacer"></span>
    </mat-toolbar-row>
  </mat-toolbar>
</div>
