<div class="modal-dialog-container">
  <h3 mat-dialog-title>{{data.title}}</h3>
  <div mat-dialog-content>
    <p>{{data.message}}</p>
  </div>
  <div mat-dialog-actions>
    <button mat-stroked-button color="accent" (click)="onOkClick()" cdkFocusInitial>{{data.okButtonText}}</button>
    <button mat-stroked-button color="accent" (click)="onCancelClick()">{{data.cancelButtonText}}</button>
  </div>
</div>
