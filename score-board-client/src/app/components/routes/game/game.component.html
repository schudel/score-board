<div class="game-container animated fadeIn">
  <mat-card>
    <mat-card-title *ngIf="game && !isCreateMode">{{game.name}}</mat-card-title>
    <mat-card-title *ngIf="isCreateMode" i18n>Create Game</mat-card-title>
    <div class="edit-create-buttons" *ngIf="game && isAdmin">
      <button *ngIf="!isEditMode" mat-stroked-button color="accent" [routerLink]="'/game/edit/' + game.id" i18n>Edit</button>
      <button mat-stroked-button color="accent" [routerLink]="'/game/create'" i18n>Create</button>
    </div>
    <mat-card-content>
      <form [formGroup]="gameForm" (ngSubmit)="onSubmit()" fxFlex="100%">
        <div fxLayout="row wrap" fxLayoutAlign="start center" fxLayoutGap="20px" class="image-container">
          <img *ngIf="image" mat-card-avatar [src]="image" alt="Avatar">
          <img *ngIf="!image" mat-card-avatar src="../../../../assets/media/No_image_available.png" alt="Avatar">
          <ngx-file-drop *ngIf="isEditMode || isCreateMode" browseBtnClassName="mat-stroked-button mat-accent" dropZoneClassName="image-drop-zone-no-radius" multiple="false" (onFileDrop)="dropped($event)"
                         accept="image/*">
            <ng-template ngx-file-drop-content-tmp let-openFileSelector="openFileSelector">
              <div style="text-align: center" i18n>Drop new Image here!</div><br>
              <button type="button" (click)="openFileSelector()" i18n>Browse Files</button>
            </ng-template>
          </ngx-file-drop>
          <button *ngIf="isEditMode || isCreateMode" mat-stroked-button color="accent" (click)="removeImage()" type="button" i18n>Remove Image</button>
        </div>
        <div fxLayout="row wrap" fxLayoutAlign="start center" fxLayoutGap="20px">
          <mat-form-field>
            <input type="text" matInput placeholder="Name" formControlName="name" i18n-placeholder required>
          </mat-form-field>
          <mat-form-field>
            <input type="text" matInput placeholder="Type" formControlName="type" i18n-placeholder [matAutocomplete]="typesAuto" required>
            <mat-autocomplete #typesAuto="matAutocomplete">
              <mat-option *ngFor="let option of filteredTypes | async" [value]="option">
                {{option}}
              </mat-option>
            </mat-autocomplete>
          </mat-form-field>
          <mat-form-field>
            <input type="text" matInput placeholder="Genre" formControlName="genre" i18n-placeholder [matAutocomplete]="genresAuto" required>
            <mat-autocomplete #genresAuto="matAutocomplete">
              <mat-option *ngFor="let option of filteredGenres | async" [value]="option">
                {{option}}
              </mat-option>
            </mat-autocomplete>
          </mat-form-field>
        </div>
        <div fxLayout="row wrap" fxLayoutAlign="start center" fxLayoutGap="20px">
          <mat-form-field>
            <input type="number" matInput placeholder="Beta" formControlName="beta" i18n-placeholder required>
          </mat-form-field>
          <mat-form-field>
            <input type="number" matInput placeholder="Draw Probability" formControlName="drawProbability" i18n-placeholder required>
          </mat-form-field>
          <mat-form-field>
            <input type="number" matInput placeholder="Dynamics Factor" formControlName="dynamicsFactor" i18n-placeholder required>
          </mat-form-field>
        </div>
        <div fxLayout="row wrap" fxLayoutAlign="start center" fxLayoutGap="20px">
          <mat-form-field>
            <input type="number" matInput placeholder="Initial Conservative Rating" formControlName="initialConservativeRating" i18n-placeholder required>
          </mat-form-field>
          <mat-form-field>
            <input type="number" matInput placeholder="Initial Mean" formControlName="initialMean" i18n-placeholder required>
          </mat-form-field>
          <mat-form-field>
            <input type="number" matInput placeholder="Initial Standard Deviation" formControlName="initialStandardDeviation" i18n-placeholder required>
          </mat-form-field>
        </div>
        <div *ngIf="isEditMode || isCreateMode" class="button-container">
          <mat-error *ngIf="error" class="error">
            {{ error }}
          </mat-error>
          <button type="submit" mat-stroked-button color="accent" i18n>Save</button>
        </div>
      </form>
      <div *ngIf="!isCreateMode && !isEditMode" fxFlex="100%">
        <h2 i18n>Statistics</h2>
        <div fxLayout="row wrap" fxLayoutAlign="start center" fxLayoutGap="20px">
          <mat-form-field>
            <input type="number" matInput placeholder="Number of played Matches" i18n-placeholder disabled [ngModel]="numberOfMatches">
          </mat-form-field>
          <!--
          <mat-form-field>
            <input type="number" matInput placeholder="Best Player" disabled>
          </mat-form-field>
          <mat-form-field>
            <input type="number" matInput placeholder="" disabled>
          </mat-form-field>
          -->
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
