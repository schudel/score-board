<div class="navigation-container" [ngClass]="{'dark-theme': isDarkTheme}">
  <mat-toolbar *ngIf="currentPlayer" color="primary" class="mat-elevation-z3 animated slideInDown">
    <mat-toolbar-row>
      <button mat-button (click)="onMenuButtonClicked()" fxShow="true" fxHide.gt-md matTooltip="Menu" matTooltipPosition="below" i18n-matTooltip>
        <i class="fas fa-bars"></i>
      </button>
      <span i18n>Scoreboard</span>
      <span class="menu-spacer"></span>
      <div fxShow="true" fxHide.lt-lg>
        <!-- The following menu items will be hidden on both SM and XS screen sizes -->
        <a routerLink="/dashboard" mat-button routerLinkActive="mat-accent"><i class="fas fa-tachometer-alt"></i><ng-container i18n="@@dashboardMenuText">Dashboard</ng-container></a>
        <a routerLink="/live" mat-button routerLinkActive="mat-accent"><i class="fas fa-video"></i><span matBadge="{{liveMatchCount}}" matBadgePosition="above after" matBadgeColor="warn" matBadgeHidden="{{!liveMatchCount}}"><ng-container i18n="@@liveMenuText">Live</ng-container></span></a>
        <a routerLink="/games" mat-button routerLinkActive="mat-accent"><i class="fas fa-gamepad"></i><ng-container i18n="@@gameMenuText">Games</ng-container></a>
        <a routerLink="/players" mat-button routerLinkActive="mat-accent"><i class="fas fa-users"></i><ng-container i18n="@@playersMenuText">Players</ng-container></a>
        <a routerLink="/matches" mat-button routerLinkActive="mat-accent"><i class="fas fa-handshake"></i><ng-container i18n="@@matchesMenuText">Matches</ng-container></a>
        <a routerLink="/ranking" mat-button routerLinkActive="mat-accent"><i class="fas fa-star"></i><ng-container i18n="@@rankingMenuText">Ranking</ng-container></a>
        <a routerLink="/statistics" mat-button routerLinkActive="mat-accent"><i class="fas fa-chart-bar"></i><ng-container i18n="@@statisticsMenuText">Statistics</ng-container></a>
        <a *ngIf="isAdmin" routerLink="/admin" mat-button routerLinkActive="mat-accent"><i class="fas fa-user-shield"></i><ng-container i18n="@@adminMenuText">Admin</ng-container></a>
      </div>
      <span class="menu-spacer"></span>
      <div fxShow="true" fxHide.lt-lg>
        <button mat-button [matMenuTriggerFor]="profileMenu">
          <!--<i class="fas fa-user-circle"></i>-->
          <span class="welcome-player" i18n>Hi, {{currentPlayer.playerName}}</span>
          <img *ngIf="currentPlayer.image" mat-card-avatar [src]="currentPlayer.image">
          <img *ngIf="!currentPlayer.image" mat-card-avatar src="../../../../assets/media/avatar-placeholder.png">
        </button>
        <mat-menu #profileMenu="matMenu" class="mat-elevation-z3">
          <mat-card class="mat-app-background" [ngClass]="{'dark-theme': isDarkTheme}">
            <mat-card-header>
              <img mat-card-image src="../../../../assets/media/bg-1.jpg">
              <img *ngIf="currentPlayer.image" mat-card-avatar [src]="currentPlayer.image">
              <img *ngIf="!currentPlayer.image" mat-card-avatar src="../../../../assets/media/avatar-placeholder.png">
              <mat-card-title>{{currentPlayer.playerName}}</mat-card-title>
              <mat-card-subtitle>{{currentPlayer.firstName}} {{currentPlayer.lastName}}</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
              <mat-nav-list>
                <mat-list-item routerLink="/profile" [queryParams]="{tab: 'personal-information'}" routerLinkActive="mat-accent"><i class="fas fa-user"></i><span><ng-container i18n="@@personalInformationMenuText">Personal Information</ng-container></span></mat-list-item>
                <mat-list-item routerLink="/profile" [queryParams]="{tab: 'change-password'}" routerLinkActive="mat-accent"><i class="fas fa-key"></i><span><ng-container i18n="@@changePasswordMenuText">Change Password</ng-container></span></mat-list-item>
                <mat-list-item routerLink="/profile" [queryParams]="{tab: 'profile-settings'}" routerLinkActive="mat-accent"><i class="fas fa-cog"></i><span><ng-container i18n="@@settingsMenuText">Settings</ng-container></span></mat-list-item>
              </mat-nav-list>
            </mat-card-content>
            <mat-card-actions>
              <button mat-stroked-button color="accent" (click)="logout()"><ng-container i18n="@@logoutMenuText">Logout</ng-container></button>
            </mat-card-actions>
          </mat-card>
        </mat-menu>
      </div>
      <button mat-button (click)="onPanelButtonClicked()" matTooltip="Quick Panel" matTooltipPosition="below" i18n-matTooltip>
        <i class="fas fa-ellipsis-v" matBadge="{{notificationsCount}}" matBadgePosition="above after" matBadgeColor="warn" matBadgeHidden="{{!notificationsCount}}"></i>
      </button>
    </mat-toolbar-row>
  </mat-toolbar>
</div>
